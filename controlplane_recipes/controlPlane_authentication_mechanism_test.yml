- name: "controlPlane_authentication_mechanism_test.yml"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "controlPlane_authentication_mechanism_test"
    parent: None

  tasks:
    - block:
        # check for the app_type
        - name: "{{ recipe_name }}: Check if the app_type is 'controlplane'."
          vars:
            app_type: "{{ app_type }}"
          debug:
            msg: "app_type is: {{ app_type }}"
          failed_when: (app_type != "controlplane")

        - name: "{{ recipe_name }}: Start pmdb and proxy servers."
          include_role:
            name: common
            tasks_from: pmdb_cluster_init.yml
          vars:
            number_of_clients: 2
            number_of_PMDBServers: 4

        - name: "{{ recipe_name }}: Starting controlplane_client to get membership details."
          vars:
            input_param:
              { "Operation": "membership", "OutfileName": "membership_output" }
            ncpclires: "{{ lookup('controlplane', 'ncpc', input_param) }}"
          debug:
            msg: "get membership details of running servers."
          with_items:
            - "{{ ncpclires }}"
          register: membership
          no_log: true

        - name: generate new uuid
          shell: uuidgen
          register: nisdUUID

        - name: Create user
          vars:
            input_param:
              {
                'operation': 'create',
                'username': 'myuser1',
                'admin_secret': 'test-admin-secret'
              }
          set_fact:
            user_response: "{{ lookup('controlplane', 'auth', input_param) }}"

        - name: "{{ recipe_name }}: Print user creation response."
          debug:
            msg: "{{ user_response }}"

        - name: Login user
          vars:
            input_param:
              {
                'operation': 'login',
                'username': 'myuser1',
                'user_secret': user_response.SecretKey
              }
          set_fact:
            login_response: "{{ lookup('controlplane', 'auth', input_param) }}"

