- name: "tidb_setup"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "tidb_setup"
    log_dir: "{{ dir_path | default('./logs') }}"
    api_base_url: "http://localhost:8081"
    infra_payload: "./examples/create_infra.json"
    vdev_payload: "./examples/create_vdev.json"
    nisd: "7fb3c81f-a112-4531-b7fd-ff7bd9c8161b"
    # vdev_uuid: "34b11429-4a48-48ce-bcf0-cfca77d8f1e7"

  tasks:
    - block:

        # Check for the app_type
        - name: "{{ recipe_name }}: Check if the app_type is 'tidb'."
          vars:
            app_type: "{{ app_type }}"
          debug:
            msg: "app_type is: {{ app_type }}"
          failed_when:
            (app_type != "tidb")

        # -----------------------------
        # 1. Create Infra
        # -----------------------------

        - name: Create infra
          set_fact:
            infra_result: "{{ lookup('tidb_api',
                'POST',
                '/infra',
                file=infra_payload,
                base_url=api_base_url) }}"

        - name: Debug infra response
          debug:
            var: infra_result

        # -----------------------------
        # 2. Create VDEV
        # -----------------------------
        
        - name: Create vdev
          set_fact:
            vdev_result: "{{ lookup('tidb_api',
                'POST',
                '/vdev',
                file=vdev_payload,
                base_url=api_base_url) }}"

        - name: Debug vdev result
          debug:
            msg: "{{ vdev_result }}"

        - name: Extract vdev UUID
          set_fact:
            vdev_uuid: "{{ vdev_result.vdev_id | default(vdev_result.uuid) }}"

        - name: Debug vdev UUID
          debug:
            msg: "Created VDEV UUID: {{ vdev_uuid }}"

        - name: "{{ recipe_name }}: create nisd device"
          vars:
            img_dir: "/sample.device"
            bs: "64M"
            count: 160
          debug:
            msg:
              - "{{ lookup('helper', 'create_dd_file', img_dir, bs, count) }}"
          register: nisd_dev_path

        - name: "{{ recipe_name }}: Print the device path."
          debug: 
            msg: "{{ nisd_dev_path.msg[0] }}"

        - name: "{{ recipe_name }}: Start niova-block-ctl process."
          vars:
            input_param: {
              'nisd_device_path': '{{ nisd_dev_path.msg[0] }}',
              'nisd_uuid': '{{ nisd }}',
            }
          debug:
            msg: "{{ lookup('nisd_handler', 'run-niova-block-ctl', input_param) }}"
    
        - name: "{{ recipe_name }}: Start nisd"
          vars:
            device_path: '{{ nisd_dev_path.msg[0] }}'
          debug:
            msg:
              - "{{ lookup('nisd_handler', 'run_nisd', nisd, device_path) }}"

        - name: "{{ recipe_name }}: wait for 25 seconds"
          pause:
            seconds: 25

        - name: "{{ recipe_name }}: Start niova-block-test process."
          vars:
            input_param: {
                 'vdev' : '{{ vdev_uuid }}',
                 'read_operation_ratio_percentage': '100',
                 'num_ops': '100',
                 'random_seed': '123',
                 'client_uuid' : "{{ vdev_uuid }}",
                 'request_size_in_bytes': '0',
                 'integrity_check': 'False',
                 'sequential_writes': 'False',
                 'blocking_process': 'False'
            }
          set_fact:
            nblock_wr: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"

        - name: "{{ recipe_name }}: DEBUG niova-block-test result."
          debug:
            msg: "{{ nblock_wr }}"

        - name: Find sample.device file
          find:
            paths: /home/runner/work/niovad/niovad/holon_log
            patterns: "sample.device"
            file_type: file
            recurse: yes            # To search in all subdirectories
          register: found_file

        - name: Delete sample.device file if it exists
          file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ found_file.files }}"
          when: found_file.matched > 0s
        